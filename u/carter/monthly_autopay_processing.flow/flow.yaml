summary: Monthly Autopay Processing
description: >
  Processes monthly autopay for pool service customers.

  1. Applies any unapplied maint payments as credits first

  2. Then processes each autopay customer: finds maint invoices, charges card,
  creates payment, sends receipt, updates Airtable


  Modes:

  - test_mode=false: Process all customers from Airtable

  - test_mode=true: Process single customer by QBO ID
value:
  modules:
    - id: a
      summary: Apply Unapplied Maint Credits
      value:
        type: rawscript
        content: '!inline apply_unapplied_maint_credits.inline_script.py'
        input_transforms:
          billing_month:
            type: javascript
            expr: flow_input.billing_month
          dry_run:
            type: javascript
            expr: flow_input.dry_run
        lock: '!inline apply_unapplied_maint_credits.inline_script.lock'
        language: python3
    - id: b
      summary: Fetch Autopay Customers
      value:
        type: rawscript
        content: '!inline fetch_autopay_customers.inline_script.py'
        input_transforms:
          billing_month:
            type: javascript
            expr: flow_input.billing_month
          test_mode:
            type: javascript
            expr: flow_input.test_mode
          test_qbo_customer_id:
            type: javascript
            expr: flow_input.test_qbo_customer_id
        assets:
          - kind: resource
            path: u/carter/airtable
        lock: '!inline fetch_autopay_customers.inline_script.lock'
        language: python3
    - id: c
      summary: Process Each Customer
      value:
        type: forloopflow
        modules:
          - id: c1
            summary: Process Single Customer
            value:
              type: rawscript
              content: '!inline process_single_customer.inline_script.py'
              input_transforms:
                billing_month:
                  type: javascript
                  expr: flow_input.billing_month
                customer:
                  type: javascript
                  expr: flow_input.iter.value
                dry_run:
                  type: javascript
                  expr: flow_input.dry_run
              assets:
                - access_type: null
                  alt_access_type: null
                  kind: resource
                  path: u/carter/airtable
              lock: '!inline process_single_customer.inline_script.lock'
              language: python3
        iterator:
          type: javascript
          expr: results.b.customers
        parallel: false
        skip_failures: true
    - id: d
      summary: Generate Summary Report
      value:
        type: rawscript
        content: '!inline generate_summary_report.inline_script.py'
        input_transforms:
          apply_credits_result:
            type: javascript
            expr: results.a
          customers_result:
            type: javascript
            expr: results.b
          processing_results:
            type: javascript
            expr: results.c
        lock: '!inline generate_summary_report.inline_script.lock'
        language: python3
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  order:
    - billing_month
    - dry_run
    - test_mode
    - test_qbo_customer_id
  properties:
    billing_month:
      type: string
      description: 'Billing month in YYYY-MM format (e.g., 2026-01 for January 2026)'
      default: 2026-01
    dry_run:
      type: boolean
      description: 'If true, simulate without making any changes'
      default: true
    test_mode:
      type: boolean
      description: >-
        If true, process only a single customer specified by
        test_qbo_customer_id
      default: true
    test_qbo_customer_id:
      type: string
      description: >-
        QBO Customer ID to process when in test_mode (e.g., 9578 for NADEAU,
        JEREMY)
      default: '9578'
  required:
    - billing_month
    - dry_run
    - test_mode
