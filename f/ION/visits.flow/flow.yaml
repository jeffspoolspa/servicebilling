summary: >-
  visits (login → fetch service log → parse → normalize → upsert
  maintenance.visits/chem_readings/consumables_usage)
description: ''
value:
  modules:
    - id: a
      summary: emit_session
      value:
        type: script
        input_transforms:
          ion:
            type: static
            value:
              loginUrl: '$var:f/ION/LOGIN_URL'
              password: '$var:f/ION/PASSWORD'
              username: '$var:f/ION/USERNAME'
        path: f/ION/_discover/emit_session
      continue_on_error: false
      retry:
        constant:
          attempts: 0
          seconds: 0
        exponential:
          attempts: 2
          multiplier: 2
          random_factor: 0
          seconds: 10
    - id: b
      summary: parse_normalize_upsert
      value:
        type: script
        input_transforms:
          ion_session:
            type: javascript
            expr: results.a
          lookback_days:
            type: javascript
            expr: flow_input.lookback_days ?? 7
          supabase_connection:
            type: static
            value: '$res:u/carter/supabase'
          write_unmapped:
            type: javascript
            expr: flow_input.write_unmapped ?? true
        path: f/ION/_discover/parse_normalize_test
      continue_on_error: false
schema: null
