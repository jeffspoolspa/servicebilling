summary: >-
  relink_visits: backfill task_id + task_schedule_id on existing
  maintenance.visits from clean tasks/schedules
description: >-
  Re-resolves task_id (the location's open task) + task_schedule_id (best
  day+tech+price slot) over existing visits now that the recurring-task sync (#58)
  and schedule-slot sync (#59) populated tasks + task_schedules. Fill-only by
  default (won't overwrite existing links). Visits on a non-scheduled weekday are
  left unlinked at the slot grain (off-cadence make-up/coverage -- a real signal).
  dry_run default rolls back. overwrite=true also re-resolves existing slot links;
  since=ISO date limits to recent visits.
value:
  modules:
    - id: a
      summary: relink visits to tasks + schedule slots
      value:
        type: script
        input_transforms:
          supabase_connection:
            type: static
            value: '$res:u/carter/supabase'
          dry_run:
            type: javascript
            expr: flow_input.dry_run ?? true
          overwrite:
            type: javascript
            expr: flow_input.overwrite ?? false
          since:
            type: javascript
            expr: flow_input.since || null
        path: f/ION/_lib/relink_visits
      continue_on_error: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - dry_run
    - overwrite
    - since
  properties:
    dry_run:
      type: boolean
      default: true
      description: >-
        If true (default), do all writes in one transaction then ROLL BACK and
        report stats. Set false to commit.
    overwrite:
      type: boolean
      default: false
      description: If true, also re-resolve task_schedule_id where already set (not just nulls).
    since:
      type: string
      format: date
      default: ''
      description: Optional ISO date; only re-link visits on/after it. Empty = all visits.
  required: []
