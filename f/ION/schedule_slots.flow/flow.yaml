summary: >-
  schedule_slots (#59): derive task_schedules day_of_week/tech/frequency from
  taskList.cfm per customer
description: >-
  Fills the day_of_week/tech gap the active-tasks sync leaves. Step a picks ION
  customer ids (only_dayless default = just customers with a dayless active slot).
  Step b sequentially pulls each customer's taskList (day-of-week from bolded
  weekly letters / Next-Service weekday for bi-weekly+monthly / all days for
  daily; tech from Assigned To; A/B from week parity) -- SEQUENTIAL because
  customerTabs sets one server-side current-customer per session. Step c
  reconciles task_schedules keyed by ion_task_id: claims dayless slots, adds
  missing day slots, refreshes tech/frequency; skips expired; skips+flags
  (task,day,frequency) already taken by another ion task (merged locations).
  Defaults to dry_run=true (rolls back). Run with dry_run=false to commit.
value:
  modules:
    - id: a
      summary: target custids (dayless-only default)
      value:
        type: script
        input_transforms:
          supabase_connection:
            type: static
            value: '$res:u/carter/supabase'
          only_dayless:
            type: javascript
            expr: flow_input.only_dayless ?? true
        path: f/ION/_lib/schedule_target_custids
      continue_on_error: false
    - id: b
      summary: sequential taskList fetch -> flat rows
      value:
        type: script
        input_transforms:
          cust_ids:
            type: javascript
            expr: results.a.cust_ids
        path: f/ION/api/list_customer_tasks
      timeout: 900
      continue_on_error: false
    - id: c
      summary: reconcile task_schedules day/tech/frequency
      value:
        type: script
        input_transforms:
          rows:
            type: javascript
            expr: results.b.rows
          supabase_connection:
            type: static
            value: '$res:u/carter/supabase'
          dry_run:
            type: javascript
            expr: flow_input.dry_run ?? true
          full_reconcile:
            type: javascript
            expr: flow_input.full_reconcile ?? false
        path: f/ION/_lib/upsert_schedules
      continue_on_error: false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - dry_run
    - only_dayless
    - full_reconcile
  properties:
    dry_run:
      type: boolean
      default: true
      description: >-
        If true (default), do all writes in one transaction then ROLL BACK and
        report stats. Set false to commit.
    only_dayless:
      type: boolean
      default: true
      description: >-
        If true (default), only pull customers that have an active slot with
        day_of_week NULL (the gap). False = full re-derive of all active
        customers (~467, slower).
    full_reconcile:
      type: boolean
      default: false
      description: >-
        If true, also deactivate dated slots whose day is no longer in the
        report. Only meaningful for a full re-derive.
  required: []
