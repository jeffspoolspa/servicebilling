summary: 'Sync field follow-ups to Airtable (wake-on-insert + 15 min heartbeat)'
description: >-
  Single writer for maintenance.follow_ups sync columns. Drains rows with
  airtable_record_id IS NULL into the Airtable "Maintenance Follow up" table
  (signed storage URLs for media; typecast on selects), echoes the record id
  back, then reads Status back for open rows (Done -> closed). Woken by the
  follow_ups_wake_sync pg_net trigger; the 15-minute pg_cron heartbeat
  (follow-ups-airtable-heartbeat) is the delivery guarantee.
kind: script
schema: null
concurrency_key: airtable_api
concurrent_limit: 1
concurrency_time_window_s: 5
