summary: Apply review-workbench draft adjustments as negative DISCOUNT lines on a QBO invoice
description: >-
  One negative SalesItemLine (DISCOUNT item 72) per adjustment with the reason in the
  description; original lines stay intact so reconcile/sold-record survive. Idempotent
  (skips identical existing discount lines); refreshes the invoice cache after writing.
concurrency_key: qbo_api
concurrency_time_window_s: 0
concurrent_limit: 1
kind: script
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    qbo_invoice_id: { type: string }
    adjustments:
      type: array
      items:
        type: object
        properties:
          item_name: { type: string }
          amount: { type: number, description: 'positive dollars off' }
          reason: { type: string }
    dry_run: { type: boolean, default: true }
  required: [qbo_invoice_id, adjustments]
