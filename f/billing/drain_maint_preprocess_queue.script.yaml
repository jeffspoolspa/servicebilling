summary: >-
  Serially drain the maintenance preprocess queue (one customer-month at a
  time)
description: >-
  Claims billing_audit.maint_preprocess_queue entries oldest-first (FOR UPDATE
  SKIP LOCKED) and runs f/billing/preprocess_maint_customer_month in-process,
  one at a time, limit per tick. Self-heals by enqueueing any linked,
  unpreprocessed period missing a live queue entry. Scheduled every 2 minutes.
concurrency_key: qbo_writer
concurrency_time_window_s: 5
concurrent_limit: 1
kind: script
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    max_per_tick:
      type: integer
      description: max customer-months to preprocess per run
      default: 10
    dry_run:
      type: boolean
      description: pass through to preprocess (report-only)
      default: false
  required: []
