summary: >-
  Send monthly maintenance invoices via QBO email delivery with pre-send safety
  checks
description: >-
  Sends pending maintenance invoices via QBO email API. Source of truth is
  send_status='pending' on maintenance_invoices. As of 2026-05, runs
  f/billing/stamp_invoice_memos first (idempotent) to stamp '{Month} Pool
  Maintenance' on any empty memo fields. Four pre-send safety checks: no-email,
  send log dedup, live QBO balance, and QBO EmailStatus dedup.
lock: '!inline f/billing/send_monthly_invoices.script.lock'
kind: script
schema: null
