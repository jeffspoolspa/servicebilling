  Read a single QBO Deposit by ID. Returns full deposit details including all
  line items with LinkedTxn expansion for matching payments, journal entries,
  and cash lines back to app records.
lock: '!inline f/check_buddy/read_qbo_deposit.script.lock'
concurrency_key: qbo_api
concurrency_time_window_s: 10
