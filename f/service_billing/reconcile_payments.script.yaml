summary: Use QBO Payment query (Intuit V4 has no listCharges endpoint)
description: >-
  Replaced Intuit listCharges (which doesn't exist in V4 — was returning
  PMT-4000 "listCharges is invalid") with a QBO Payment query. After every
  successful charge, process_invoice records a QBO Payment with CCTransId set to
  the Intuit charge_id. The reconciler now searches QBO for Payments matching
  the customer + amount + date window + payment method. If one exists with
  CCTransId set, we know the charge landed and what its ID is. Limitation:
  doesn't help when the script crashed BEFORE record_qbo_payment (no QBO record
  exists). Those still wait for the 24h window to expire and get auto-promoted
  to charge_uncertain_expired for fresh retry.
lock: '!inline f/service_billing/reconcile_payments.script.lock'
kind: script
schema: null
