summary: Auto-flip also checks for succeeded attempt (covers invoice-email path)
description: >-
  Previously: auto-flip only fired when balance=0 AND email_status=EmailSent.
  That excluded invoice-email-path invoices which have balance > 0 by definition
  until the customer pays. Now: also flips when theres a succeeded
  process_attempt for the invoice (our own work log), covering both the charge
  path (balance=0) and the invoice-email path (email delivered, balance still
  due).
lock: '!inline f/service_billing/refresh_open_invoices.script.lock'
kind: script
schema: null
