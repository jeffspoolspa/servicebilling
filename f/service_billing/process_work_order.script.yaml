summary: 'Process work order: apply credits, charge card/ACH, send invoice via QBO'
description: >-
  Reads matched credits from billing.open_credits WHERE matched_wo_number =
  wo_number, applies each to the QBO invoice (Payment link or CreditMemo link),
  then charges remaining balance via card/ACH if payment_method=on_file. Updates
  billing.processing_attempts audit log. Concurrency lock via
  billing_status=processing. Supports single WO or batch via wo_numbers list.
lock: '!inline f/service_billing/process_work_order.script.lock'
kind: script
schema: null
